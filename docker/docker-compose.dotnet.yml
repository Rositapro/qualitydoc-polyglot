# Microservicio 1: Módulo Central (.NET 10 + SQL Server 2022)
# Levantarlo: docker-compose -f docker-compose.dotnet.yml up -d --build
# Detenerlo:  docker-compose -f docker-compose.dotnet.yml down

services:

  db-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: db-sqlserver
    user: root
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Document2026!
    volumes:
      - mssql_data:/var/opt/mssql/data
      - ../db/sqlserver/init.sql:/usr/config/init.sql
    networks:
      - dotnet-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Document2026!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: db-sqlserver-init
    depends_on:
      db-sqlserver:
        condition: service_healthy
    volumes:
      - ../db/sqlserver/init.sql:/usr/config/init.sql
    entrypoint: >
      /bin/bash -c "
      echo 'SQL Server ready, running init.sql...';
      /opt/mssql-tools18/bin/sqlcmd -S db-sqlserver -U sa -P 'Document2026!' -C -i /usr/config/init.sql;
      echo 'Database initialized successfully!';
      "
    networks:
      - dotnet-net

  admin-dotnet:
    build:
      context: ../src/dotnet-core/src/modulo-central
      dockerfile: Dockerfile
    container_name: admin-dotnet
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db-sqlserver;Database=DocumentManagement;User Id=sa;Password=Document2026!;TrustServerCertificate=True;
      - MongoDb__ConnectionString=mongodb://db-mongodb:27017
      - MongoDb__DatabaseName=qualitydoc
    volumes:
      - ../src/dotnet-core/src/modulo-central/QualityDocc.MVC/wwwroot/uploads:/app/wwwroot/uploads
    depends_on:
      db-sqlserver:
        condition: service_healthy
    networks:
      - dotnet-net

networks:
  dotnet-net:
    driver: bridge

volumes:
  mssql_data:
