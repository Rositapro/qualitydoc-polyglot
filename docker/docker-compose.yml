version: '3.8'

services:
  # ==========================================
  # MÓDULO DE CONSULTA PÚBLICA (PHP & POSTGRES)
  # ==========================================
  
  # Base de Datos PostgreSQL
  db-postgres:
    image: postgres:16
    container_name: db-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sgd_user
      POSTGRES_PASSWORD: sgd_password
      POSTGRES_DB: sgd_db
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../db/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - qualitydoc-net

  # Servidor Web PHP
  web-php:
    build:
      context: ../src/php-app
      dockerfile: ../../docker/php.Dockerfile
    container_name: web-php
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db-postgres
      - DB_PORT=5432
      - DB_NAME=sgd_db
      - DB_USER=sgd_user
      - DB_PASSWORD=sgd_password
      - AUTH_API_URL=http://admin-dotnet:8080/api/login
    volumes:
      - ../src/php-app:/var/www/html
    depends_on:
      - db-postgres
    networks:
      - qualitydoc-net

  # ==========================================
  # MÓDULO DE BÚSQUEDA INTELIGENTE (NODE & MONGO)
  # ==========================================

  # Base de Datos NoSQL MongoDB
  db-mongodb:
    image: mongo:latest
    container_name: db-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ../db/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js
    networks:
      - qualitydoc-net

  # Microservicio de Búsqueda Node.js (TypeScript)
  search-service:
    build:
      context: ../src/node-service
      dockerfile: ../../docker/node.Dockerfile
    container_name: search-service
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://db-mongodb:27017/qualitydoc
      - NODE_ENV=production
      - AUTH_API_URL=http://admin-dotnet:8080/api/login
    depends_on:
      - db-mongodb
    networks:
      - qualitydoc-net

  # ==========================================
  # MÓDULO CENTRAL (.NET & SQL SERVER)
  # ==========================================

  db-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db-sqlserver
    user: root
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Document2026!
    volumes:
      - mssql_data:/var/opt/mssql/data
      - ../db/sqlserver/init.sql:/usr/config/init.sql
    networks:
      - qualitydoc-net

  db-sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db-sqlserver-init
    depends_on:
      - db-sqlserver
    volumes:
      - ../db/sqlserver/init.sql:/usr/config/init.sql
    entrypoint: >
      /bin/bash -c "
      echo 'Waiting for SQL Server to start...';
      for i in {1..60}; do
        /opt/mssql-tools18/bin/sqlcmd -S db-sqlserver -U sa -P 'Document2026!' -C -Q 'SELECT 1' &>/dev/null
        if [ $$? -eq 0 ]; then
          echo 'SQL Server is up, running init.sql...';
          /opt/mssql-tools18/bin/sqlcmd -S db-sqlserver -U sa -P 'Document2026!' -C -i /usr/config/init.sql;
          echo 'Database initialized successfully!';
          exit 0;
        fi
        sleep 2;
      done;
      echo 'SQL Server initialization timed out.';
      exit 1;
      "
    networks:
      - qualitydoc-net

  admin-dotnet:
    build:
      context: ../src/dotnet-core/src/modulo-central
      dockerfile: Dockerfile
    container_name: admin-dotnet
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db-sqlserver;Database=DocumentManagement;User Id=sa;Password=Document2026!;TrustServerCertificate=True;
    volumes:
      - ../src/dotnet-core/src/modulo-central/QualityDocc.MVC/wwwroot/uploads:/app/wwwroot/uploads
    depends_on:
      - db-sqlserver
    networks:
      - qualitydoc-net

networks:
  qualitydoc-net:
    driver: bridge

volumes:
  pg_data:
  mongo_data:
  mssql_data:
